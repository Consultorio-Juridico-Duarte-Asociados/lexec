name: Robot de Decretos LexEC

on:
  schedule:
    # Se ejecuta todos los días a las 12:00 UTC (07:00 AM hora Ecuador)
    - cron: '0 12 * * *'
  workflow_dispatch:
    # Esto mantiene el botón de "Run workflow" para que puedas activarlo manualmente cuando quieras

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 supabase

      - name: Ejecutar robot de presidencia
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python robot_presidencia.py
