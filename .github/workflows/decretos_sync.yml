name: Robot de Decretos LexEC

on:
  schedule:
    - cron: '0 13 * * *'   # 8:00 AM Ecuador — después del robot de leyes
  workflow_dispatch:

jobs:
  decretos:
    runs-on: ubuntu-22.04
    timeout-minutes: 25

    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests beautifulsoup4 supabase PyMuPDF

      - name: Ejecutar robot del Registro Oficial
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
        run: python robot_presidencia.py
